apiVersion: v1
kind: Service
metadata:
  name: {{ include "temporal-scaling-demo.fullname" . }}-main-api
  labels:
    {{- include "temporal-scaling-demo.labels" (list . "main-api") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: order-api
      port: 8082
      targetPort: 8082
    - name: shipment-api
      port: 8083
      targetPort: 8083
    - name: metrics
      port: 9090
      targetPort: 9090
  selector:
    {{- include "temporal-scaling-demo.selectorLabels" (list . "main-api") | nindent 4 }}