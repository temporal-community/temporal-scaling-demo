{{- if .Values.keda.enabled }}
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ include "temporal-scaling-demo.fullname" . }}-main-worker
  annotations:
    "helm.sh/hook": post-install,post-upgrade
  labels:
    {{- include "temporal-scaling-demo.labels" (list . "main-worker-scaler") | nindent 4 }}
spec:
  scaleTargetRef:
    name: {{ include "temporal-scaling-demo.fullname" . }}-main-worker
  minReplicaCount: 1
  maxReplicaCount: 10
  advanced:
    scalingModifiers:
      formula: "orders + shipment"
      target: "1"
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 30
          policies:
          - type: Pods
            value: 1
            periodSeconds: 60
        scaleDown:
          stabilizationWindowSeconds: 60
          policies:
          - type: Pods
            value: 1
            periodSeconds: 60
  triggers:
    - type: temporal
      name: orders
      metadata:
        namespace: default
        taskQueue: orders
        targetQueueSize: "1"
        endpoint: "{{ include "temporal.componentname" (list .Subcharts.temporal "frontend") }}:7233"
    - type: temporal
      name: shipment
      metadata:
        namespace: default
        taskQueue: shipment
        targetQueueSize: "1"
        endpoint: "{{ include "temporal.componentname" (list .Subcharts.temporal "frontend") }}:7233"
{{- end }}