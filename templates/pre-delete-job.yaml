{{- if .Values.keda.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "temporal-scaling-demo.fullname" . }}-scaledobject-cleanup
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
  labels:
    {{- include "temporal-scaling-demo.labels" (list . "cleanup-job") | nindent 4 }}
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 100
  template:
    metadata:
      labels:
        {{- include "temporal-scaling-demo.labels" (list . "cleanup-job") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "temporal-scaling-demo.fullname" . }}-keda-cleanup
      containers:
      - name: kubectl
        image: "bitnami/kubectl:latest"
        imagePullPolicy: IfNotPresent
        command:
        - /bin/sh
        - -c
        - |
          set -e
          kubectl annotate scaledobject {{ include "temporal-scaling-demo.fullname" . }}-main-worker keda.sh/reconciliation-paused=true --overwrite || true
          kubectl annotate scaledobject {{ include "temporal-scaling-demo.fullname" . }}-billing-worker keda.sh/reconciliation-paused=true --overwrite || true
          kubectl patch scaledobject {{ include "temporal-scaling-demo.fullname" . }}-main-worker --type=merge -p '{"metadata":{"finalizers":[]}}' || true
          kubectl patch scaledobject {{ include "temporal-scaling-demo.fullname" . }}-billing-worker --type=merge -p '{"metadata":{"finalizers":[]}}' || true
          kubectl delete scaledobject {{ include "temporal-scaling-demo.fullname" . }}-main-worker --ignore-not-found=true
          kubectl delete scaledobject {{ include "temporal-scaling-demo.fullname" . }}-billing-worker --ignore-not-found=true
      restartPolicy: Never
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "temporal-scaling-demo.fullname" . }}-keda-cleanup
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-weight": "-15"
    "helm.sh/hook-delete-policy": before-hook-creation
  labels:
    {{- include "temporal-scaling-demo.labels" (list . "cleanup-sa") | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "temporal-scaling-demo.fullname" . }}-keda-cleanup-role
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-weight": "-15"
    "helm.sh/hook-delete-policy": before-hook-creation
  labels:
    {{- include "temporal-scaling-demo.labels" (list . "cleanup-role") | nindent 4 }}
rules:
- apiGroups: ["keda.sh"]
  resources: ["scaledobjects"]
  verbs: ["get", "patch", "delete", "annotate"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "temporal-scaling-demo.fullname" . }}-keda-cleanup-binding
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-weight": "-15"
    "helm.sh/hook-delete-policy": before-hook-creation
  labels:
    {{- include "temporal-scaling-demo.labels" (list . "cleanup-binding") | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "temporal-scaling-demo.fullname" . }}-keda-cleanup-role
subjects:
- kind: ServiceAccount
  name: {{ include "temporal-scaling-demo.fullname" . }}-keda-cleanup
{{- end }} 