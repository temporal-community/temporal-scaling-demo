apiVersion: v1
kind: Service
metadata:
  name: {{ include "temporal-scaling-demo.fullname" . }}-billing-api
  labels:
    {{- include "temporal-scaling-demo.labels" (list . "billing-api") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: billing-api
      port: 8081
      targetPort: 8081
    - name: fraud-api
      port: 8084
      targetPort: 8084
    - name: metrics
      port: 9090
      targetPort: 9090
  selector:
    {{- include "temporal-scaling-demo.selectorLabels" (list . "billing-api") | nindent 4 }}