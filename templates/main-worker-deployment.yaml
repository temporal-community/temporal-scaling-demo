apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "temporal-scaling-demo.fullname" . }}-main-worker
  labels:
    {{- include "temporal-scaling-demo.labels" (list . "main-worker") | nindent 4 }}
spec:
  replicas: {{ .Values.main.worker.replicaCount }}
  selector:
    matchLabels:
      {{- include "temporal-scaling-demo.selectorLabels" (list . "main-worker") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "temporal-scaling-demo.labels" (list . "main-worker") | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}-main-worker
          image: "{{ .Values.main.worker.image.repository }}:{{ .Values.main.worker.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
          args:
            {{- if .Values.secretKey }}
            - "-k"
            - {{ .Values.secretKey }}
            {{- end }}
            - "-s"
            - "order,shipment"
          env:
            - name: TEMPORAL_ADDRESS
              value: "{{ include "temporal.componentname" (list .Subcharts.temporal "frontend") }}:7233"
            - name: TEMPORAL_METRICS_ENDPOINT
              value: "0.0.0.0:9090"
            - name: BILLING_API_URL
              value: "http://{{ include "temporal-scaling-demo.fullname" . }}-billing-api:8081"
            - name: ORDER_API_URL
              value: "http://{{ include "temporal-scaling-demo.fullname" . }}-main-api:8082"
            - name: SHIPMENT_API_URL
              value: "http://{{ include "temporal-scaling-demo.fullname" . }}-main-api:8083"
          resources:
            {{- toYaml .Values.main.worker.resources | nindent 12 }}